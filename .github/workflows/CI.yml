name: CI
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
  workflow_dispatch:        # manual re-trigger entrypoint

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # record-timings pushes the orphan ci-timings branch

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Shard planner.  WHAT-to-run is the canonical validation-case universe
  # (test/ci/universe.jl, single source of truth + completeness guard).  This
  # job only decides HOW to split it: it Longest-Processing-Time bin-packs the
  # cases using the `ci-timings` orphan branch when present, else falls back to
  # deterministic round-robin over the declared weights.  Change shard count N
  # here and nowhere else.
  # ───────────────────────────────────────────────────────────────────────────
  plan:
    name: Plan shards
    runs-on: ubuntu-latest
    outputs:
      plan: ${{ steps.gen.outputs.plan }}
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
          arch: x64
      - name: Fetch timing history (best-effort)
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin ci-timings >/dev/null 2>&1; then
            git fetch --depth=1 origin ci-timings
            git show FETCH_HEAD:timings.tsv > timings.tsv 2>/dev/null \
              && echo "Loaded $(wc -l < timings.tsv) timing rows" \
              || { echo "ci-timings has no timings.tsv — round-robin"; : > timings.tsv; }
          else
            echo "no ci-timings branch yet — round-robin fallback"
            : > timings.tsv
          fi
      - id: gen
        run: |
          set -euo pipefail
          # N shards.  Scales with the case count; the heavy qatlas_* cases
          # dominate wall-clock, so N≥ (#qatlas cases + a few) lets LPT isolate
          # each heavy case onto its own shard — the main win.  10 cases today.
          N=8
          plan=$(julia test/ci/plan_shards.jl "$N" timings.tsv)
          count=$(jq 'length' <<<"$plan")
          if [ "$count" -lt 1 ]; then
            echo "::error::plan_shards produced an empty plan (count=$count)"
            exit 1
          fi
          echo "plan=$plan" >> "$GITHUB_OUTPUT"
          echo "Planned $count shards."

  test:
    name: shard ${{ matrix.sid }}
    runs-on: ubuntu-latest
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.plan) }}
    env:
      # The subset of validation cases this shard runs.  Empty string ⇒ no
      # validation legs (the unit suite still runs and the shard passes).
      CMC_TEST_CASES: ${{ matrix.cases }}
      # PR = fast merge gate (light lanes, no emit).  push:main = full sweeps +
      # emit per-case timings so the persisted numbers reflect the heavy run.
      CMC_TEST_FULL: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && '1' || matrix.full }}
      CMC_EMIT_TIMING: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && '1' || '0' }}
      CMC_SHARD_ID: ${{ matrix.sid }}
      # julia-runtest sandboxes Pkg.test, so @__DIR__ points into a temp copy.
      # Pin the emit dir to the workspace so upload-artifact (which scans the
      # workspace) actually finds the emitted timing files.
      CMC_CIOUT_DIR: ${{ github.workspace }}/test/.ci-out
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
          arch: x64
      - uses: julia-actions/cache@v3
        with:
          cache-name: shard-${{ matrix.sid }}
          # include-matrix:true would serialize the ENTIRE matrix context
          # (including the `cases` list) into the cache key, risking the 512-char
          # key limit and busting the cache every run.  matrix.sid already keys
          # the cache name.
          include-matrix: 'false'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          julia-args: "--threads=auto"
      - uses: julia-actions/julia-processcoverage@v1
      # Codecov merges multiple per-shard uploads server-side; no aggregation
      # job needed.  Non-fatal so a coverage hiccup never reds the merge gate.
      - uses: codecov/codecov-action@v7
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: shard-${{ matrix.sid }}
      - name: Upload shard timing (push:main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: timing-${{ matrix.sid }}
          path: test/.ci-out/timings-*.tsv
          retention-days: 1
          if-no-files-found: warn
          overwrite: true
          include-hidden-files: true

  record-timings:
    name: Record timing history
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: timing-parts
          pattern: timing-*
      - name: Merge into the ci-timings orphan branch (latest value wins)
        run: |
          set -euo pipefail
          mkdir -p merged
          if git ls-remote --exit-code --heads origin ci-timings >/dev/null 2>&1; then
            git fetch --depth=1 origin ci-timings
            git show FETCH_HEAD:timings.tsv > merged/timings.tsv 2>/dev/null || : > merged/timings.tsv
          else
            : > merged/timings.tsv
          fi
          find timing-parts -name 'timings-*.tsv' -exec cat {} + >> merged/timings.tsv || true
          awk -F'\t' 'NF==2{t[$1]=$2} END{for (k in t) print k"\t"t[k]}' \
            merged/timings.tsv | sort > merged/final.tsv
          rows=$(wc -l < merged/final.tsv)
          if [ "$rows" -lt 1 ]; then
            echo "::warning::push:main produced 0 timing rows — emit path may be broken; planner keeps round-robin fallback."
            exit 0
          fi
          echo "Merged timing rows: $rows"
          tmp=$(mktemp -d)
          cp merged/final.tsv "$tmp/timings.tsv"
          cd "$tmp"
          git init -q
          git config user.email "ci@classicalmontecarlo"
          git config user.name "cmc-ci"
          git checkout -q -b ci-timings
          git add timings.tsv
          git commit -q -m "ci: refresh validation-case timings ($rows rows) [skip ci]"
          git push -q --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" ci-timings

  gate:
    name: All shards passed
    runs-on: ubuntu-latest
    needs: [plan, test]
    if: always()
    steps:
      - name: Check plan + every shard passed
        run: |
          if [ "${{ needs.plan.result }}" != "success" ]; then
            echo "Shard planning failed: ${{ needs.plan.result }}"
            exit 1
          fi
          plan='${{ needs.plan.outputs.plan }}'
          if [ -z "$plan" ] || [ "$plan" = "[]" ]; then
            echo "Plan produced no shards ('$plan') — the test matrix would be empty"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more test shards failed: ${{ needs.test.result }}"
            exit 1
          fi
          echo "All shards green."
